services:
  postgres:
    image: postgres:16-alpine
    container_name: shipin-social-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shipin
      POSTGRES_PASSWORD: shipin
      POSTGRES_DB: shipin_social
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: shipin-social-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shipin.local
      PGADMIN_DEFAULT_PASSWORD: shipin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
